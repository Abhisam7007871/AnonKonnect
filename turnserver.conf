# coturn configuration for AnonKonnect
# For production, replace <EXTERNAL_IP> and <SECRET>

listening-port=3478
tls-listening-port=5349

# Use fingerprinting in protocols
fingerprint

# Use long-term credential mechanism
lt-cred-mech

# Static credential (for simple setup, use secret-key for production)
user=anonkonnect:konnect-secret-2026

# Realm is your domain name
realm=anonkonnect.com

# External IP of the server
# external-ip=EXTERNAL_IP_HERE

# Relay ports
min-port=49152
max-port=49200

# Logging
verbose
log-file=/var/log/turn.log
