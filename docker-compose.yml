version: '3.8'

services:
  # 1. Signaling Server
  signaling-server:
    build: .
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      - redis
    networks:
      - anonkonnect-net

  # 2. Redis for Matchmaking & Scaling
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - anonkonnect-net
    command: redis-server --save 60 1 --loglevel warning

  # 3. Coturn for WebRTC NAT Traversal (STUN/TURN)
  coturn:
    image: coturn/coturn
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/udp"
      - "5349:5349/tcp"
      - "49152-49200:49152-49200/udp"
    networks:
      - anonkonnect-net
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf
    # In a real prod setup, you'd provide turnserver.conf with actual domain/secrets

networks:
  anonkonnect-net:
    driver: bridge
